<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0" stop-color="#d9d0c3"/>
      <stop offset="1" stop-color="#bfb19c"/>
    </linearGradient>
    <filter id="gblur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <radialGradient id="vignette" cx="0.2" cy="0.5" r="1">
      <stop offset="0" stop-color="#000" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.02"/>
    </radialGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <!-- soft blurred photo block -->
  <g transform="translate(0,40)">
    <rect x="0" y="0" width="100%" height="820" fill="#cdbfae"/>
    <rect x="0" y="0" width="100%" height="820" fill="#bfb19c" opacity="0.2" filter="url(#gblur)"/>
    <rect x="0" y="0" width="100%" height="820" fill="url(#vignette)" />
  </g>
  <!-- editorial frame -->
  <g transform="translate(120,160)">
    <rect x="0" y="0" width="1200" height="500" rx="6" fill="#efe7dd" opacity="0.35"/>
    <rect x="28" y="36" width="1144" height="430" rx="4" fill="#efe7dd"/>
    <text x="60" y="120" font-family="Playfair Display, serif" font-size="72" fill="#3b362f">Designed for calmer days.</text>
    <text x="60" y="168" font-family="Inter, sans-serif" font-size="18" fill="#6b6359">Thoughtfully designed clothing for ADHD minds.</text>
  </g>
</svg>